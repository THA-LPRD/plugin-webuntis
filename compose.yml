# Title: LPRD Plugin Template
# Description: Base plugin service for the LPRD Management platform

services:
  plugin:
    container_name: ghcr.io/tha-lprd/lprd-plugin:latest
    restart: no
    ports:
      - "8000:8000"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORE_URL: ${CORE_URL:-http://localhost:3000}
      WORKOS_AUTHKIT_DOMAIN: ${WORKOS_AUTHKIT_DOMAIN:?authkit domain required}
      CLIENT_ID: ${CLIENT_ID:?client id required}
      CLIENT_SECRET: ${CLIENT_SECRET:?client secret required}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///data/plugin.db}
      PLUGIN_BASE_URL: ${PLUGIN_BASE_URL:-http://localhost:8001}
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-30000}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-60}
